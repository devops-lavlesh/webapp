name: Deploy Frontend to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16.x'

    - name: Install dependencies
      run: npm install

    - name: Build app
      run: npm run build

    # React case: build folder deploy hota hai
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: webappmoduledemo123   # same as terraform
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./build